      };

    } catch (err) {
      commandPanel.innerHTML = '<div class="sectionTitle">Command</div><div class="small">Controls hit an error. Minimal fallback is active.</div><div class="small" style="margin-top:4px;color:#ffd2d2;">' + escapeHtml(String(err && err.message || err)) + '</div>' +
        '<div class="footerGrid" style="margin-top:8px;">' +
        '<button class="actionBtn" id="fallbackDestBtn">Destination</button>' +
        '<button class="actionBtn" id="fallbackCenterBtn">Center</button>' +
        '<button class="actionBtn" id="fallbackNextBtn">Next Ship</button>' +
        '<button class="actionBtn danger" id="fallbackEndBtn">End Turn</button>' +
        '</div>';
      const a = document.getElementById('fallbackDestBtn');
      if (a) a.onclick = () => { state.pendingAction = 'dest'; state.message = actionHint('dest'); renderStatusPanel(); };
      const b = document.getElementById('fallbackCenterBtn');
      if (b) b.onclick = () => { state.view.x = ship.x; state.view.y = ship.y; };
      const c = document.getElementById('fallbackNextBtn');
      if (c) c.onclick = () => { cycleSelectedShip(1); refreshPanels(); };
      const d = document.getElementById('fallbackEndBtn');
      if (d) d.onclick = runTurn;
      console.error(err);
    }
  }

  function planForBots() {
    const battle = state.battle;
    const ships = battle.ships.filter(s => s.team !== 0 && !s.destroyed);
    for (const ship of ships) {
      const type = shipTypes[ship.type];
      const enemies = battle.ships.filter(e => e.team !== ship.team && !e.destroyed);
      const visible = enemies.filter(e => e.visibleBy.has(ship.team));
      const closest = visible.sort((a, b) => Math.hypot(a.x - ship.x, a.y - ship.y) - Math.hypot(b.x - ship.x, b.y - ship.y))[0] || enemies[0] || null;
      ship.plan.throttle = ship.type === 'battleship' ? 0.7 : 0.85;
      ship.plan.action = null;

      if (ship.type === 'carrier') ship.plan.throttle = 0.45;
      if (ship.type === 'submarine') ship.plan.throttle = 0.8;

      if (closest) {
        const d = Math.hypot(closest.x - ship.x, closest.y - ship.y);
        const ang = angleTo(ship, closest);
        const desiredRange = ship.type === 'battleship' ? 840 : ship.type === 'destroyer' ? 460 : ship.type === 'carrier' ? 1180 : ship.type === 'cruiser' ? 680 : 520;
        let dest = { x: ship.x + Math.cos(ang) * 160, y: ship.y + Math.sin(ang) * 160 };

        const coverIsland = battle.islands.find(island => Math.hypot(island.x - ship.x, island.y - ship.y) < 420 && Math.hypot(island.x - closest.x, island.y - closest.y) < 420);
        if (coverIsland && ship.type !== 'carrier') {
          const flank = angleTo(closest, coverIsland) + (Math.random() < 0.5 ? -1 : 1) * 1.15;
          dest = { x: coverIsland.x + Math.cos(flank) * (coverIsland.r + 65), y: coverIsland.y + Math.sin(flank) * (coverIsland.r + 65) };
        } else if (d < desiredRange * 0.8) {
          dest = { x: ship.x - Math.cos(ang) * 140, y: ship.y - Math.sin(ang) * 140 };
          ship.plan.throttle = 0.55;
        } else if (d > desiredRange * 1.15) {
          dest = { x: ship.x + Math.cos(ang) * 170, y: ship.y + Math.sin(ang) * 170 };
        }
        dest.x = clamp(dest.x, 50, MAP_W - 50);
        dest.y = clamp(dest.y, 50, MAP_H - 50);
        ship.plan.course = routeSegmentAroundIslands(ship, { x: ship.x, y: ship.y }, dest).slice(0, 5);
        syncPlanDest(ship);

        if (ship.type === 'submarine') {
          if (d < 320 && Math.random() < 0.7) ship.plan.action = { kind: 'submerge', value: true };
          else if (d > 400 && ship.submerged && Math.random() < 0.4) ship.plan.action = { kind: 'submerge', value: false };
        }

        if (type.bombers && ship.cooldowns.bombers <= 0 && d <= type.bombers.range && visible.includes(closest)) {
          ship.plan.weaponTargets.bombers = { ...predictFuturePosition(closest, 4), mode: 'strike' };
        } else if (type.torpedoes && ship.cooldowns.torps <= 0 && d <= type.torpedoes.range && Math.random() < 0.75) {
          ship.plan.weaponTargets.torps = predictFuturePosition(closest, d / type.torpedoes.speed);
        } else if (type.guns && ship.cooldowns.guns <= 0 && d <= 620 && visible.includes(closest)) {
          ship.plan.weaponTargets.guns = predictFuturePosition(closest, d / type.projectileSpeed);
        } else if (type.mines && d < 230 && Math.random() < 0.5) {
          ship.plan.action = { kind: 'mines' };
        }
      } else {
        ship.plan.course = routeSegmentAroundIslands(ship, { x: ship.x, y: ship.y }, { x: clamp(ship.x + rand(-120, 120), 50, MAP_W - 50), y: clamp(ship.y + rand(-120, 120), 50, MAP_H - 50) }).slice(0, 5);
        syncPlanDest(ship);
      }
    }
  }

  function predictFuturePosition(ship, seconds) {
    const targetThrottle = ship.plan?.throttle ?? ship.throttle;
    const ang = ship.angle;
    const type = shipTypes[ship.type];
    const factor = ship.type === 'submarine' && ship.submerged ? type.submergedSpeedFactor : 1;
    const targetSpeed = type.maxSpeed * targetThrottle * factor;
    const predictedSpeed = targetSpeed >= ship.speed
      ? Math.min(targetSpeed, ship.speed + type.acceleration * Math.max(0, seconds) * 0.5)
      : Math.max(targetSpeed, ship.speed - type.acceleration * Math.max(0, seconds) * 0.65);
    return {
      x: clamp(ship.x + Math.cos(ang) * predictedSpeed * seconds, 0, MAP_W),
      y: clamp(ship.y + Math.sin(ang) * predictedSpeed * seconds, 0, MAP_H)
    };
  }

  function runTurn() {
    if (state.mode !== 'battle' || state.battle.turnPhase !== 'planning') return;
    planForBots();
    state.battle.turnPhase = 'resolving';
    state.battle.simTime = 0;
    state.message = 'Resolving turn...';
    log(`Turn ${state.turn} executing.`);
    refreshPanels();
  }

  function finishTurn() {
    const battle = state.battle;
    battle.turnPhase = 'planning';
    state.turn += 1;
    state.message = 'Orders ready.';
    battle.ships.forEach(ship => {
      if (ship.destroyed) return;
      ship.throttle = ship.plan.throttle;
      if (ship.plan.action?.kind === 'submerge') {
        ship.submerged = !!ship.plan.action.value;
      }
      ship.cooldowns.guns = Math.max(0, ship.cooldowns.guns);
      ship.cooldowns.torps = Math.max(0, ship.cooldowns.torps);
      ship.cooldowns.bombers = Math.max(0, ship.cooldowns.bombers);
      ship.plan.weaponTargets = { guns: null, torps: null, bombers: null };
    });
    updateVisibility();
    evaluateVictory();
    refreshPanels();
  }

  function evaluateVictory() {
    const battle = state.battle;
    const aliveShips = battle.ships.filter(s => !s.destroyed);
    const playerAlive = aliveShips.some(s => s.team === 0);
    const enemyAlive = aliveShips.some(s => s.team !== 0);

    if (!playerAlive) {
      battle.winner = aliveShips.find(s => s.team !== 0)?.team ?? null;
      log('Your fleet has been destroyed.');
      showEndModal('Defeat');
      return;
    }

    if (!enemyAlive) {
      battle.winner = 0;
      log('You won the battle.');
      showEndModal('Victory');
      return;
    }

    const aliveTeams = new Set(aliveShips.map(s => s.team));
    if (aliveTeams.size <= 1) {
      const winner = [...aliveTeams][0];
      battle.winner = winner;
      if (winner === 0) {
        log('You won the battle.');
        showEndModal('Victory');
      } else if (winner == null) {
        log('All fleets destroyed.');
        showEndModal('Draw');
      } else {
        log(`${teamName(winner)} wins.`);
        showEndModal('Defeat');
      }
    }
  }

  function applyDamage(target, amount, sourceText) {
    if (target.destroyed) return;
    target.hp -= amount;
    state.battle.explosions.push({ x: target.x, y: target.y, r: 20 + amount * 0.3, life: 0.7 });
    addFloatingText(target.x, target.y - 18, '-' + fmt(amount), target.team === 0 ? '#ffd2d2' : '#fff4c9', 1.0);
    if (canPlayerSee(target) || target.team === 0 || sourceText.includes('Player')) {
      log(`${sourceText} hits ${shipDisplayName(target)} for ${fmt(amount)}.`);
    }
    if (target.hp <= 0) {
      target.destroyed = true;
      target.hp = 0;
      state.battle.explosions.push({ x: target.x, y: target.y, r: 58, life: 1.4 });
      log(`${shipDisplayName(target)} sinks.`);
      if (target.id === state.selectedShipId) state.selectedShipId = getPlayerShips()[0]?.id || null;
    }
  }

  function resolveTurnStep(dt) {
    const battle = state.battle;
    battle.simTime += dt;

    // cooldowns
    battle.ships.forEach(ship => {
      if (ship.destroyed) return;
      ship.cooldowns.guns = Math.max(0, ship.cooldowns.guns - dt);
      ship.cooldowns.torps = Math.max(0, ship.cooldowns.torps - dt);
      ship.cooldowns.bombers = Math.max(0, ship.cooldowns.bombers - dt);
    });

    // execute queued actions early in the turn
    if (!battle.actionExecutedThisTurn) battle.actionExecutedThisTurn = new Set();
    for (const ship of battle.ships) {
      if (ship.destroyed) continue;
      const action = ship.plan.action;
      const weapons = ship.plan.weaponTargets || {};

      if (action?.kind === 'submerge' && battle.simTime >= getActionTime('submerge') && !battle.actionExecutedThisTurn.has(ship.id + ':submerge')) {
        ship.submerged = !!action.value;
        battle.actionExecutedThisTurn.add(ship.id + ':submerge');
        log(`${shipDisplayName(ship)} ${ship.submerged ? 'dives' : 'surfaces'}.`);
      }

      if (weapons.guns && battle.simTime >= getActionTime('guns') && !battle.actionExecutedThisTurn.has(ship.id + ':guns') && ship.cooldowns.guns <= 0) {
        fireGuns(ship, weapons.guns);
        ship.cooldowns.guns = shipTypes[ship.type].reload;
        battle.actionExecutedThisTurn.add(ship.id + ':guns');
      }
      if (weapons.torps && battle.simTime >= getActionTime('torps') && !battle.actionExecutedThisTurn.has(ship.id + ':torps') && ship.cooldowns.torps <= 0) {
        fireTorpedoes(ship, weapons.torps);
        ship.cooldowns.torps = shipTypes[ship.type].torpedoes.reload;
        battle.actionExecutedThisTurn.add(ship.id + ':torps');
      }
      if (weapons.bombers && battle.simTime >= getActionTime('bombers') && !battle.actionExecutedThisTurn.has(ship.id + ':bombers') && ship.cooldowns.bombers <= 0) {
        launchBombers(ship, weapons.bombers);
        ship.cooldowns.bombers = shipTypes[ship.type].bombers.reload;
        battle.actionExecutedThisTurn.add(ship.id + ':bombers');
      }
    }

    // movement
    for (const ship of battle.ships) {
      if (ship.destroyed) continue;
      updateShipMotion(ship, dt);
      if (ship.plan.action?.kind === 'mines') maybeDropMine(ship);
    }

    // projectiles
    updateProjectiles(dt);
    updateTorpedoes(dt);
    updateAircraft(dt);
    updateMines(dt);
    updateExplosions(dt);
    updateFloatingTexts(dt);
    updatePings(dt);

    battle.lastVisibilityCheck += dt;
    if (battle.lastVisibilityCheck >= VIS_RECHECK_RATE) {
      battle.lastVisibilityCheck = 0;
      updateVisibility();
    }

    if (battle.simTime >= TURN_DURATION) {
      battle.actionExecutedThisTurn.clear();
      finishTurn();
    }
  }

  function updateShipMotion(ship, dt) {
    const type = shipTypes[ship.type];
    const targetThrottle = ship.plan.throttle;
    const speedFactor = ship.type === 'submarine' && ship.submerged ? type.submergedSpeedFactor : 1;
    const maxSpeed = type.maxSpeed * speedFactor;
    const targetSpeed = maxSpeed * targetThrottle;
    const accel = type.acceleration * (targetSpeed >= ship.speed ? 1 : 1.3);
    if (ship.speed < targetSpeed) ship.speed = Math.min(targetSpeed, ship.speed + accel * dt);
    else ship.speed = Math.max(targetSpeed, ship.speed - accel * dt);

    ensureCoursePlan(ship);
    let desiredAngle = ship.angle;
    if (ship.plan.dest) {
      const toDest = Math.hypot(ship.plan.dest.x - ship.x, ship.plan.dest.y - ship.y);
      if (toDest > 8) desiredAngle = Math.atan2(ship.plan.dest.y - ship.y, ship.plan.dest.x - ship.x);
    }
    const turnRate = ship.type === 'submarine' && ship.submerged ? type.turnRateSubmerged : type.turnRate;
    const diff = normAngle(desiredAngle - ship.angle);
    const maxTurn = turnRate * dt;
    ship.angle += clamp(diff, -maxTurn, maxTurn);

    const old = { x: ship.x, y: ship.y };
    ship.x += Math.cos(ship.angle) * ship.speed * dt;
    ship.y += Math.sin(ship.angle) * ship.speed * dt;
    let bounded = clampToArena({ x: ship.x, y: ship.y }, 20);
    ship.x = bounded.x;
    ship.y = bounded.y;

    for (const island of state.battle.islands) {
      const rad = island.r + shipRadius(ship) + 6;
      const d = Math.hypot(ship.x - island.x, ship.y - island.y);
      if (d < rad) {
        const outAng = Math.atan2(ship.y - island.y, ship.x - island.x);
        ship.x = island.x + Math.cos(outAng) * rad;
        ship.y = island.y + Math.sin(outAng) * rad;

        const activeDest = ship.plan.dest || { x: ship.x + Math.cos(ship.angle) * 120, y: ship.y + Math.sin(ship.angle) * 120 };
        const aroundSign = normAngle(Math.atan2(activeDest.y - island.y, activeDest.x - island.x) - outAng) >= 0 ? 1 : -1;
        const tangentAng = outAng + aroundSign * Math.PI / 2;
        ship.angle = tangentAng;
        ship.x += Math.cos(tangentAng) * 8;
        ship.y += Math.sin(tangentAng) * 8;
        ship.speed = Math.max(ship.speed * 0.7, 18);


      }
    }

    const moveDist = Math.hypot(ship.x - old.x, ship.y - old.y);
    if (ship.plan.dest && Math.hypot(ship.plan.dest.x - ship.x, ship.plan.dest.y - ship.y) < 34) {
      if (ship.plan.course && ship.plan.course.length) ship.plan.course.shift();
      syncPlanDest(ship);
      if (!ship.plan.dest && ship.plan.courseMode === 'stop') {
        ship.plan.throttle = 0;
      }
    }
    ship.statusText = moveDist < 1 ? 'holding' : 'moving';
  }

  function shipRadius(ship) {
    const type = shipTypes[ship.type];
    return ship.type === 'submarine' && ship.submerged ? type.sizeSubmerged : type.size;
  }

  function fireGuns(ship, target) {
    const type = shipTypes[ship.type];
    for (let i = 0; i < type.guns.count; i++) {
      const spread = (i - (type.guns.count - 1) / 2) * 9;
      const ang = angleTo(ship, target) + rand(-0.05, 0.05) + spread * 0.002;
      const distToTarget = Math.hypot(target.x - ship.x, target.y - ship.y);
      const flight = distToTarget / type.projectileSpeed;
      const scatter = (1 - type.gunAccuracy) * (18 + distToTarget * 0.08);
      const landing = {
        x: target.x + rand(-scatter, scatter),
        y: target.y + rand(-scatter, scatter)
      };
      state.battle.projectiles.push({
        team: ship.team,
        sourceId: ship.id,
        x: ship.x,
        y: ship.y,
        prevX: ship.x,
        prevY: ship.y,
        startX: ship.x,
        startY: ship.y,
        targetX: landing.x,
        targetY: landing.y,
        t: 0,
        duration: Math.max(0.6, flight),
        damage: type.gunDamage,
        splash: type.guns.splash,
        color: teamColors[ship.team]
      });
    }
    state.battle.explosions.push({ x: ship.x, y: ship.y, r: 14, life: 0.22 });
    if (ship.team === 0 || canPlayerSee(ship)) log(`${shipDisplayName(ship)} opens fire.`);
  }

  function fireTorpedoes(ship, target) {
    const type = shipTypes[ship.type];
    const torp = type.torpedoes;
    const ang = angleTo(ship, target);
    const shots = ship.type === 'destroyer' ? 3 : 2;
    for (let i = 0; i < shots; i++) {
      const offset = (i - (shots - 1) / 2) * torp.spread;
      const dir = ang + offset * 0.01;
      state.battle.torpedoes.push({
        team: ship.team,
        sourceId: ship.id,
        x: ship.x,
        y: ship.y,
        prevX: ship.x,
        prevY: ship.y,
        angle: dir,
        speed: torp.speed,
        rangeLeft: torp.range,
        damage: torp.damage,
        life: torp.range / torp.speed + 0.5
      });
    }
    state.battle.explosions.push({ x: ship.x, y: ship.y, r: 10, life: 0.18 });
    if (ship.team === 0 || canPlayerSee(ship)) log(`${shipDisplayName(ship)} launches torpedoes.`);
  }

  function launchBombers(ship, target) {
    const b = shipTypes[ship.type].bombers;
    const mode = target.mode || ship.plan.bomberMode || 'strike';
    const count = Math.min(3, ship.planesAvailable || 0);
    if (count <= 0) {
      if (ship.team === 0) log(`${shipDisplayName(ship)} has no ready aircraft.`);
      return;
    }

    ship.planesAvailable -= count;
    const strikeAngle = typeof target.angle === 'number' ? target.angle : Math.atan2(target.y - ship.y, target.x - ship.x);
    const lanePerpX = Math.cos(strikeAngle + Math.PI / 2);
    const lanePerpY = Math.sin(strikeAngle + Math.PI / 2);

    for (let i = 0; i < count; i++) {
      const lateral = (i - (count - 1) / 2) * 60;
      const aircraft = {
        team: ship.team,
        sourceId: ship.id,
        x: ship.x,
        y: ship.y,
        targetX: target.x,
        targetY: target.y,
        laneTargetX: target.x + lanePerpX * lateral,
        laneTargetY: target.y + lanePerpY * lateral,
        strikeAngle,
        speed: b.speed,
        hp: b.health,
        damage: b.damage,
        bombs: b.bombs,
        spread: b.spread,
        stage: 'outbound',
        mode,
        planeIndex: i,
        planeCount: count,
        lateralOffset: lateral,
        bombCooldown: 0,
        patrolTime: TURN_DURATION * 2.3,
        orbitAngle: (i / Math.max(1, count)) * Math.PI * 2,
        hasDroppedStrike: false,
        flightTime: 0,
        returnTime: 0
      };
      state.battle.aircraft.push(aircraft);
    }
    addPing(ship.x, ship.y, mode === 'patrol' ? 'Patrol Launched' : 'Strike Launched', 'rgba(255,220,150,0.95)');
    if (ship.team === 0 || canPlayerSee(ship)) log(`${shipDisplayName(ship)} launches ${count} bomber${count === 1 ? '' : 's'} (${mode}).`);
  }

  function maybeDropMine(ship) {
    const type = shipTypes[ship.type];
    if (!type.mines) return;
    if (Math.random() > 0.06) return;
    const friendlyMines = state.battle.mines.filter(m => m.team === ship.team && m.sourceId === ship.id);
    if (friendlyMines.length >= type.mines.limit) return;
    state.battle.mines.push({ x: ship.x, y: ship.y, team: ship.team, sourceId: ship.id, damage: type.mines.damage, armed: 1.5, life: 120 });
  }

  function updateProjectiles(dt) {
    const list = state.battle.projectiles;
    for (let i = list.length - 1; i >= 0; i--) {
      const p = list[i];
      p.prevX = p.x;
      p.prevY = p.y;
      p.t += dt / p.duration;
      p.x = lerp(p.startX, p.targetX, p.t);
      p.y = lerp(p.startY, p.targetY, p.t);
      if (p.t >= 1) {
        state.battle.explosions.push({ x: p.targetX, y: p.targetY, r: p.splash, life: 0.5 });
        for (const ship of state.battle.ships) {
          if (ship.destroyed || ship.team === p.team) continue;
          const d = Math.hypot(ship.x - p.targetX, ship.y - p.targetY);
          if (d <= p.splash + shipRadius(ship)) {
            const falloff = clamp(1 - d / (p.splash + shipRadius(ship) + 1), 0.35, 1);
            applyDamage(ship, p.damage * falloff, `${teamName(p.team)} shellfire`);
          }
        }
        list.splice(i, 1);
      }
    }
  }

  function updateTorpedoes(dt) {
    const list = state.battle.torpedoes;
    for (let i = list.length - 1; i >= 0; i--) {
      const t = list[i];
      const old = { x: t.x, y: t.y };
      t.prevX = t.x;
      t.prevY = t.y;
      t.x += Math.cos(t.angle) * t.speed * dt;
      t.y += Math.sin(t.angle) * t.speed * dt;
      t.rangeLeft -= t.speed * dt;
      t.life -= dt;
      let remove = false;
      for (const island of state.battle.islands) {
        if (Math.hypot(t.x - island.x, t.y - island.y) < island.r + 6) {
          remove = true;
          state.battle.explosions.push({ x: t.x, y: t.y, r: 18, life: 0.35 });
          break;
        }
      }
      if (!remove) {
        for (const ship of state.battle.ships) {
          if (ship.destroyed || ship.team === t.team) continue;
          if (lineCircleHit(old, t, ship, shipRadius(ship) + TORPEDO_HIT_RADIUS)) {
            applyDamage(ship, t.damage, `${teamName(t.team)} torpedoes`);
            remove = true;
            break;
          }
        }
      }
      if (remove || t.life <= 0 || t.rangeLeft <= 0 || t.x < 0 || t.y < 0 || t.x > MAP_W || t.y > MAP_H) list.splice(i, 1);
    }
  }

  function updateAircraft(dt) {
    const list = state.battle.aircraft;

    const dropBombAt = (a, impact) => {
      state.battle.explosions.push({ x: impact.x, y: impact.y, r: 28, life: 0.45 });
      for (const ship of state.battle.ships) {
        if (ship.destroyed || ship.team === a.team) continue;
        const d = Math.hypot(ship.x - impact.x, ship.y - impact.y);
        if (d <= 38 + shipRadius(ship)) {
          applyDamage(ship, a.damage * clamp(1 - d / 60, 0.4, 1), `${teamName(a.team)} bombers`);
        }
      }
    };

    for (let i = list.length - 1; i >= 0; i--) {
      const a = list[i];
      a.flightTime = (a.flightTime || 0) + dt;
      if (a.stage === 'return') a.returnTime = (a.returnTime || 0) + dt;

      for (const ship of state.battle.ships) {
        if (ship.destroyed || ship.team === a.team) continue;
        const type = shipTypes[ship.type];
        if (!type.aa || type.aaRange <= 0) continue;
        const d = Math.hypot(a.x - ship.x, a.y - ship.y);
        if (d <= type.aaRange && !segmentIntersectsIsland(a, ship, state.battle.islands)) {
          a.hp -= type.aa * dt * 0.18;
        }
      }

      if (a.hp <= 0) {
        state.battle.explosions.push({ x: a.x, y: a.y, r: 16, life: 0.4 });
        log(`${teamName(a.team)} bomber was shot down.`);
        list.splice(i, 1);
        continue;
      }

      if (a.mode === 'patrol' && a.stage === 'patrol') {
        a.orbitAngle += dt * 1.35;
        const orbitR = 90;
        a.x = a.targetX + Math.cos(a.orbitAngle) * orbitR;
        a.y = a.targetY + Math.sin(a.orbitAngle) * orbitR;
        a.patrolTime -= dt;
        a.bombCooldown -= dt;

        if (a.bombCooldown <= 0) {
          const targetShip = state.battle.ships.find(ship => !ship.destroyed && ship.team !== a.team && Math.hypot(ship.x - a.x, ship.y - a.y) < 70);
          if (targetShip) {
            dropBombAt(a, { x: targetShip.x, y: targetShip.y });
            a.bombCooldown = 2.2;
          }
        }

        if (a.patrolTime <= 0) a.stage = 'return';
      } else {
        const homeShip = getShipById(a.sourceId);
        const tx = a.stage === 'outbound'
          ? (a.mode === 'strike' ? a.laneTargetX : a.targetX)
          : (homeShip ? homeShip.x : a.x);
        const ty = a.stage === 'outbound'
          ? (a.mode === 'strike' ? a.laneTargetY : a.targetY)
          : (homeShip ? homeShip.y : a.y);

        const dx = tx - a.x;
        const dy = ty - a.y;
        const distToTarget = Math.hypot(dx, dy);
        const ang = distToTarget > 0.001 ? Math.atan2(dy, dx) : (a.strikeAngle || 0);
        const step = a.speed * dt;

        if (distToTarget <= step) {
          a.x = tx;
          a.y = ty;
        } else {
          a.x += Math.cos(ang) * step;
          a.y += Math.sin(ang) * step;
        }

        if (a.stage === 'outbound' && distToTarget < 28) {
          if (a.mode === 'patrol') {
            a.stage = 'patrol';
          } else if (!a.hasDroppedStrike) {
            const strikeAng = a.strikeAngle || ang;
            for (let b = 0; b < a.bombs; b++) {
              const forward = (b - (a.bombs - 1) / 2) * 42;
              const impact = {
                x: a.x + Math.cos(strikeAng) * forward,
                y: a.y + Math.sin(strikeAng) * forward
              };
              dropBombAt(a, impact);
            }
            a.hasDroppedStrike = true;
            a.stage = 'return';
            a.returnTime = 0;
          }
        }

        const docked = a.stage === 'return' && (
          distToTarget < 34 ||
          (homeShip && Math.hypot(a.x - homeShip.x, a.y - homeShip.y) < 56) ||
          a.returnTime > 10
        );
        if (docked) {
          if (homeShip && !homeShip.destroyed) {
            homeShip.planesAvailable = Math.min(homeShip.planesTotal, homeShip.planesAvailable + 1);
          }
          list.splice(i, 1);
        }
      }
    }
  }

  function updateMines(dt) {
    const list = state.battle.mines;
    for (let i = list.length - 1; i >= 0; i--) {
      const m = list[i];
      m.armed -= dt;
      m.life -= dt;
      if (m.life <= 0) { list.splice(i, 1); continue; }
      if (m.armed > 0) continue;
      for (const ship of state.battle.ships) {
        if (ship.destroyed || ship.team === m.team) continue;
        if (Math.hypot(ship.x - m.x, ship.y - m.y) <= shipRadius(ship) + MINE_TRIGGER_RADIUS) {
          applyDamage(ship, m.damage, `${teamName(m.team)} mines`);
          state.battle.explosions.push({ x: m.x, y: m.y, r: 30, life: 0.55 });
          list.splice(i, 1);
          break;
        }
      }
    }
  }

  function updateExplosions(dt) {
    const list = state.battle.explosions;
    for (let i = list.length - 1; i >= 0; i--) {
      list[i].life -= dt;
      if (list[i].life <= 0) list.splice(i, 1);
    }
  }

  function updateFloatingTexts(dt) {
    const list = state.battle.floatingTexts || [];
    for (let i = list.length - 1; i >= 0; i--) {
      list[i].life -= dt;
      list[i].y -= 18 * dt;
      if (list[i].life <= 0) list.splice(i, 1);
    }
  }

  function updatePings(dt) {
    const list = state.battle.pings || [];
    for (let i = list.length - 1; i >= 0; i--) {
      list[i].life -= dt;
      if (list[i].life <= 0) list.splice(i, 1);
    }
  }

  function render() {
    resizeCanvas();
    drawBackground();
    if (state.mode === 'battle' && state.battle) {
      drawIslands();
      drawFog();
      drawMines();
      drawPaths();
      drawProjectiles();
      drawShips();
      drawAircraft();
      drawExplosions();
      drawPings();
      drawFloatingTexts();
      drawArenaBoundary();
      drawMinimapHint();
    }
  }

  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
    g.addColorStop(0, '#10263b');
    g.addColorStop(1, '#06121d');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const grid = 120 * state.view.zoom;
    if (grid > 20) {
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      const startX = ((-state.view.x * state.view.zoom + canvas.width / 2) % grid + grid) % grid;
      const startY = ((-state.view.y * state.view.zoom + canvas.height / 2) % grid + grid) % grid;
      for (let x = startX; x < canvas.width; x += grid) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = startY; y < canvas.height; y += grid) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }
    }
  }

  function drawIslands() {
    for (const island of state.battle.islands) {
      const p = worldToScreen(island.x, island.y);
      const r = island.r * state.view.zoom;
      if (p.x + r < -120 || p.y + r < -120 || p.x - r > canvas.width + 120 || p.y - r > canvas.height + 120) continue;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(island.rot);
      ctx.beginPath();
      for (let i = 0; i < 24; i++) {
        const a = i / 24 * Math.PI * 2;
        const mod = 0.84 + Math.sin(a * 3 + island.bump) * 0.12 + Math.cos(a * 5 + island.bump * 2) * 0.07;
        const rr = r * mod;
        const x = Math.cos(a) * rr;
        const y = Math.sin(a) * rr * island.bump;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      const grad = ctx.createRadialGradient(-r*0.2, -r*0.2, r*0.2, 0, 0, r);
      grad.addColorStop(0, '#9a885d');
      grad.addColorStop(1, '#635338');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.24)';
      ctx.lineWidth = Math.max(1.2, 2 * state.view.zoom);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawFog() {
    const enemies = state.battle.ships.filter(s => s.team !== 0 && !canPlayerSee(s) && !s.destroyed && s.lastSeenTurnByPlayer > 0);
    for (const ship of enemies) {
      const p = worldToScreen(ship.x, ship.y);
      const r = (shipRadius(ship) + 12) * state.view.zoom;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.setLineDash([4, 6]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  function shouldDrawMarker(markers, point, minPx = 28) {
    return !markers.some(m => Math.hypot(m.x - point.x, m.y - point.y) < minPx);
  }

  function drawPaths() {
    for (const ship of getPlayerShips()) {
      ensureCoursePlan(ship);
      const selected = ship.id === state.selectedShipId;

      if (ship.plan.course.length) {
        const first = worldToScreen(ship.x, ship.y);
        ctx.strokeStyle = selected ? 'rgba(118,199,255,0.95)' : 'rgba(118,199,255,0.38)';
        ctx.lineWidth = selected ? 2.4 : 1.2;
        ctx.setLineDash([8, 6]);
        ctx.beginPath();
        ctx.moveTo(first.x, first.y);
        for (const pt of ship.plan.course) {
          const sp = worldToScreen(pt.x, pt.y);
          ctx.lineTo(sp.x, sp.y);
        }
        ctx.stroke();
        ctx.setLineDash([]);

        if (selected) {
          const drawn = [];
          ship.plan.course.slice(0, 5).forEach((pt, idx) => {
            const wp = worldToScreen(pt.x, pt.y);
            if (!shouldDrawMarker(drawn, wp, 24)) return;
            drawn.push(wp);
            ctx.fillStyle = idx === ship.plan.course.length - 1 ? 'rgba(16,40,56,0.92)' : 'rgba(12,28,42,0.8)';
            ctx.beginPath();
            ctx.arc(wp.x, wp.y, idx === ship.plan.course.length - 1 ? 11 : 9, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = idx === ship.plan.course.length - 1 && ship.plan.courseMode === 'keep' ? 'rgba(255,210,120,0.9)' : 'rgba(118,199,255,0.7)';
            ctx.lineWidth = 1.8;
            ctx.stroke();
            ctx.fillStyle = '#eaf7ff';
            ctx.font = '10px system-ui';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(String(idx + 1), wp.x, wp.y + 0.5);
          });

          const markers = predictSteps(ship);
          markers.forEach((m, idx) => {
            const p = worldToScreen(m.x, m.y);
            if (!shouldDrawMarker(drawn, p, 28)) return;
            drawn.push(p);
            ctx.fillStyle = 'rgba(0,18,32,0.82)';
            ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = 'rgba(118,199,255,0.55)';
            ctx.stroke();
            ctx.fillStyle = '#eaf7ff';
            ctx.font = '11px system-ui';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(String(idx + 1), p.x, p.y + 0.5);
          });
        }
      }

      const weaponTargets = ship.plan.weaponTargets || {};
      const drawReticle = (target, color) => {
        if (!target) return;
        const tp = worldToScreen(target.x, target.y);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(tp.x, tp.y, 16, 0, Math.PI * 2);
        ctx.moveTo(tp.x - 22, tp.y);
        ctx.lineTo(tp.x + 22, tp.y);
        ctx.moveTo(tp.x, tp.y - 22);
        ctx.lineTo(tp.x, tp.y + 22);
        ctx.stroke();
        if (target.mode === 'strike' && typeof target.angle === 'number') {
          const dx = Math.cos(target.angle);
          const dy = Math.sin(target.angle);
          const px = Math.cos(target.angle + Math.PI / 2);
          const py = Math.sin(target.angle + Math.PI / 2);
          ctx.setLineDash([6, 5]);
          for (const lateral of [-60, 0, 60]) {
            const cx = target.x + px * lateral;
            const cy = target.y + py * lateral;
            const a = worldToScreen(cx - dx * 54, cy - dy * 54);
            const b = worldToScreen(cx + dx * 54, cy + dy * 54);
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
          ctx.setLineDash([]);
        }
      };
      drawReticle(weaponTargets.guns, 'rgba(255,208,130,0.9)');
      drawReticle(weaponTargets.torps, 'rgba(122,225,255,0.9)');
      drawReticle(weaponTargets.bombers, 'rgba(255,200,120,0.9)');
      if (selected && state.pendingAction === 'bombers' && ship.plan.bomberMode === 'strike' && state.pointer.aimWorldStart) {
        drawReticle({
          x: state.pointer.aimWorldStart.x,
          y: state.pointer.aimWorldStart.y,
          mode: 'strike',
          angle: Math.atan2((state.pointer.aimWorldCurrent?.y ?? state.pointer.aimWorldStart.y) - state.pointer.aimWorldStart.y, (state.pointer.aimWorldCurrent?.x ?? state.pointer.aimWorldStart.x) - state.pointer.aimWorldStart.x)
        }, 'rgba(255,220,150,0.95)');
      }
    }
  }

  function predictSteps(ship) {
    ensureCoursePlan(ship);
    if (!ship.plan.course.length) return [];
    const type = shipTypes[ship.type];
    const factor = ship.type === 'submarine' && ship.submerged ? type.submergedSpeedFactor : 1;
    const maxSpeed = type.maxSpeed * factor;
    let desiredSpeed = maxSpeed * ship.plan.throttle;
    const steps = [];
    const course = ship.plan.course.map(pt => ({ x: pt.x, y: pt.y }));
    let x = ship.x, y = ship.y, speed = ship.speed, ang = ship.angle;
    for (let turn = 1; turn <= 4; turn++) {
      const span = TURN_DURATION;
      for (let t = 0; t < span; t += TURN_DT) {
        const dest = course[0] || null;
        if (dest) {
          const desiredAngle = Math.atan2(dest.y - y, dest.x - x);
          ang += clamp(normAngle(desiredAngle - ang), -type.turnRate * TURN_DT, type.turnRate * TURN_DT);
        }
        if (!dest && ship.plan.courseMode === 'stop') desiredSpeed = 0;
        if (speed < desiredSpeed) speed = Math.min(desiredSpeed, speed + type.acceleration * TURN_DT);
        else speed = Math.max(desiredSpeed, speed - type.acceleration * TURN_DT);
        x += Math.cos(ang) * speed * TURN_DT;
        y += Math.sin(ang) * speed * TURN_DT;
        if (dest && Math.hypot(dest.x - x, dest.y - y) < 34) {
          course.shift();
        }
      }
      steps.push({ x, y });
    }
    return steps;
  }

  function drawProjectiles() {
    for (const p of state.battle.projectiles) {
      const sp = worldToScreen(p.x, p.y);
      const pp = worldToScreen(p.prevX ?? p.x, p.prevY ?? p.y);
      ctx.strokeStyle = p.color.replace(')', ', 0.0)');
      ctx.beginPath();
      ctx.moveTo(pp.x, pp.y);
      ctx.lineTo(sp.x, sp.y);
      ctx.lineWidth = Math.max(1.5, 3 * state.view.zoom);
      ctx.strokeStyle = p.color;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, Math.max(2, 4 * state.view.zoom), 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
    for (const t of state.battle.torpedoes) {
      const sp = worldToScreen(t.x, t.y);
      const pp = worldToScreen(t.prevX ?? t.x, t.prevY ?? t.y);
      const r = Math.max(3, 6 * state.view.zoom);
      ctx.strokeStyle = 'rgba(180,245,255,0.55)';
      ctx.lineWidth = Math.max(1, 2.2 * state.view.zoom);
      ctx.beginPath();
      ctx.moveTo(pp.x, pp.y);
      ctx.lineTo(sp.x, sp.y);
      ctx.stroke();
      ctx.save();
      ctx.translate(sp.x, sp.y);
      ctx.rotate(t.angle);
      ctx.fillStyle = 'rgba(132,235,255,0.95)';
      ctx.fillRect(-r * 1.2, -r * 0.45, r * 2.4, r * 0.9);
      ctx.restore();
    }
  }

  function drawMines() {
    for (const m of state.battle.mines) {
      const sp = worldToScreen(m.x, m.y);
      const r = 7 * state.view.zoom;
      if (r < 1.5) continue;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, r, 0, Math.PI * 2);
      ctx.fillStyle = m.armed > 0 ? 'rgba(160,160,160,0.7)' : 'rgba(255,180,120,0.9)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.stroke();
    }
  }

  function drawShips() {
    const ships = state.battle.ships.slice().sort((a, b) => shipRadius(a) - shipRadius(b));
    for (const ship of ships) {
      if (ship.destroyed) continue;
      const visible = canPlayerSee(ship);
      if (ship.team !== 0 && !visible && ship.lastSeenTurnByPlayer <= 0) continue;
      const sp = worldToScreen(ship.x, ship.y);
      const baseSize = shipRadius(ship) * state.view.zoom;
      if (sp.x < -50 || sp.y < -50 || sp.x > canvas.width + 50 || sp.y > canvas.height + 50) continue;
      ctx.save();
      ctx.translate(sp.x, sp.y);
      ctx.rotate(ship.angle);
      const alpha = ship.team === 0 ? 1 : visible ? 1 : 0.24;
      ctx.globalAlpha = alpha;
      drawShipShape(ship, baseSize);
      ctx.restore();

      // hp bar
      const w = Math.max(22, baseSize * 2.1);
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(sp.x - w / 2, sp.y - baseSize - 12, w, 5);
      ctx.fillStyle = ship.team === 0 ? '#75f7b1' : '#ff8f8f';
      ctx.fillRect(sp.x - w / 2, sp.y - baseSize - 12, w * (ship.hp / ship.maxHp), 5);
      if (ship.id === state.selectedShipId) {
        ctx.strokeStyle = 'rgba(118,199,255,0.95)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(sp.x, sp.y, baseSize + 10, 0, Math.PI * 2);
        ctx.stroke();
      }
      if (ship.type === 'submarine' && ship.submerged) {
        ctx.strokeStyle = 'rgba(135,205,230,0.5)';
        ctx.setLineDash([4, 5]);
        ctx.beginPath();
        ctx.arc(sp.x, sp.y, baseSize + 6, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }

  function drawShipShape(ship, size) {
    const type = shipTypes[ship.type];
    const color = ship.team === 0 ? type.color : teamColors[ship.team];
    const hull = ship.type === 'carrier' ? size * 1.9 : ship.type === 'battleship' ? size * 1.75 : size * 1.55;
    const beam = ship.type === 'battleship' ? size * 0.72 : size * 0.58;
    ctx.beginPath();
    ctx.moveTo(hull, 0);
    ctx.lineTo(size * 0.4, beam);
    ctx.lineTo(-hull * 0.75, beam * 0.9);
    ctx.lineTo(-hull, 0);
    ctx.lineTo(-hull * 0.75, -beam * 0.9);
    ctx.lineTo(size * 0.4, -beam);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth = Math.max(1, size * 0.08);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.24)';
    ctx.fillRect(-size * 0.3, -beam * 0.3, size * 0.8, beam * 0.6);
    if (type.guns && ship.type !== 'carrier' && !(ship.type === 'submarine' && ship.submerged)) {
      ctx.fillStyle = 'rgba(20,30,40,0.65)';
      const turrets = Math.max(1, type.guns.count);
      for (let i = 0; i < turrets; i++) {
        const x = lerp(-size * 0.1, hull * 0.62, turrets === 1 ? 1 : i / (turrets - 1));
        ctx.fillRect(x - size * 0.14, -size * 0.12, size * 0.28, size * 0.24);
      }
    }
    if (ship.type === 'carrier') {
      ctx.strokeStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath();
      ctx.moveTo(-hull * 0.8, 0);
      ctx.lineTo(hull * 0.9, 0);
      ctx.stroke();
    }
  }

  function drawAircraft() {
    for (const a of state.battle.aircraft) {
      const sp = worldToScreen(a.x, a.y);
      ctx.save();
      ctx.translate(sp.x, sp.y);
      ctx.fillStyle = a.team === 0 ? '#fff0b7' : '#ffc2b7';
      ctx.beginPath();
      ctx.moveTo(0, -6);
      ctx.lineTo(11, 0);
      ctx.lineTo(0, 6);
      ctx.lineTo(2, 0);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawExplosions() {
    for (const ex of state.battle.explosions) {
      const sp = worldToScreen(ex.x, ex.y);
      const alpha = clamp(ex.life, 0, 1);
      const r = ex.r * state.view.zoom * (1 + (1 - alpha) * 0.3);
      const grad = ctx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, r);
      grad.addColorStop(0, `rgba(255,245,190,${0.85 * alpha})`);
      grad.addColorStop(0.5, `rgba(255,180,80,${0.55 * alpha})`);
      grad.addColorStop(1, `rgba(255,80,20,0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPings() {
    for (const ping of state.battle.pings || []) {
      const sp = worldToScreen(ping.x, ping.y);
      const alpha = clamp(ping.life / ping.maxLife, 0, 1);
      const radius = 14 + (1 - alpha) * 26;
      ctx.strokeStyle = ping.color.replace('0.95', String(0.9 * alpha));
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = `rgba(255,245,190,${0.95 * alpha})`;
      ctx.font = '12px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(ping.label, sp.x, sp.y - radius - 4);
    }
  }

  function drawFloatingTexts() {
    for (const ft of state.battle.floatingTexts || []) {
      const sp = worldToScreen(ft.x, ft.y);
      const alpha = clamp(ft.life / ft.maxLife, 0, 1);
      ctx.globalAlpha = alpha;
      ctx.font = 'bold 13px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = ft.color;
      ctx.fillText(ft.text, sp.x, sp.y);
      ctx.globalAlpha = 1;
    }
  }

  function drawArenaBoundary() {
    const c = worldToScreen(ARENA_CX, ARENA_CY);
    const r = ARENA_R * state.view.zoom;
    if (r < 8) return;
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, canvas.width, canvas.height);
    ctx.arc(c.x, c.y, r, 0, Math.PI * 2, true);
    ctx.fillStyle = 'rgba(3,8,15,0.45)';
    ctx.fill('evenodd');
    ctx.beginPath();
    ctx.arc(c.x, c.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(170,220,255,0.38)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  function drawMinimapHint() {
    ctx.save();
    const w = canvas.width < 760 ? 92 : 110;
    const h = canvas.width < 760 ? 66 : 80;
    const panelRect = commandPanel.getBoundingClientRect();
    const reservedBottom = commandPanel && panelRect.height ? Math.max(12, canvas.height - panelRect.top + 10) : 12;
    const x = canvas.width - w - 12;
    const y = Math.max(88, canvas.height - h - reservedBottom);
    ctx.globalAlpha = 0.8;
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.strokeRect(x, y, w, h);
    for (const island of state.battle.islands) {
      ctx.fillStyle = 'rgba(170,150,100,0.65)';
      ctx.beginPath();
      ctx.arc(x + island.x / MAP_W * w, y + island.y / MAP_H * h, Math.max(2, island.r / MAP_W * w), 0, Math.PI * 2);
      ctx.fill();
    }
    for (const ship of state.battle.ships) {
      if (ship.destroyed) continue;
      if (ship.team !== 0 && !canPlayerSee(ship)) continue;
      ctx.fillStyle = teamColors[ship.team];
      ctx.beginPath();
      ctx.arc(x + ship.x / MAP_W * w, y + ship.y / MAP_H * h, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    const vw = canvas.width / state.view.zoom / MAP_W * w;
    const vh = canvas.height / state.view.zoom / MAP_H * h;
    const vx = x + ((state.view.x - canvas.width / 2 / state.view.zoom) / MAP_W) * w;
    const vy = y + ((state.view.y - canvas.height / 2 / state.view.zoom) / MAP_H) * h;
    ctx.strokeStyle = 'rgba(118,199,255,0.9)';
    ctx.strokeRect(vx, vy, vw, vh);
    ctx.restore();
  }

  function setBomberTarget(ship, startWorld, endWorld = null) {
    const range = getWeaponRange(ship, 'bombers');
    const d = Math.hypot(startWorld.x - ship.x, startWorld.y - ship.y);
    if (range > 0 && d > range) {
      state.message = `Bomber target is out of range (${fmt(d)} > ${fmt(range)}).`;
      refreshPanels();
      return false;
    }
    if (!ship.plan.weaponTargets) ship.plan.weaponTargets = { guns: null, torps: null, bombers: null };
    const angle = endWorld ? Math.atan2(endWorld.y - startWorld.y, endWorld.x - startWorld.x) : Math.atan2(startWorld.y - ship.y, startWorld.x - ship.x);
    ship.plan.weaponTargets.bombers = {
      x: clamp(startWorld.x, 0, MAP_W),
      y: clamp(startWorld.y, 0, MAP_H),
      mode: ship.plan.bomberMode,
      angle
    };
    clearPendingAction();
    state.message = ship.plan.bomberMode === 'strike' ? 'Bomber strike target and direction set.' : 'Bomber patrol target set.';
    refreshPanels();
    return true;
  }

  function handleMapTap(world) {
    if (state.mode !== 'battle' || state.battle.turnPhase !== 'planning') return;
    const selectedShip = getSelectedShip();
    if (!selectedShip) return;
    ensureCoursePlan(selectedShip);

    const tappedShip = findShipNear(world.x, world.y, 28 / state.view.zoom);
    if (tappedShip && tappedShip.team === 0) {
      state.selectedShipId = tappedShip.id;
      clearPendingAction();
      state.message = '';
      refreshPanels();
      return;
    }

    if (state.pendingAction === 'dest') {
      addCoursePoint(selectedShip, { x: world.x, y: world.y });
      state.message = `Course point ${selectedShip.plan.course.length} added. Tap more points or Finish Plot.`;
      refreshPanels();
      return;
    }

    const tryTargetedAction = (kind, successText) => {
      if (!canActionExecuteThisTurn(selectedShip, kind)) {
        state.message = 'That weapon cannot fire during this turn window.';
        refreshPanels();
        return true;
      }
      const range = getWeaponRange(selectedShip, kind);
      const d = Math.hypot(world.x - selectedShip.x, world.y - selectedShip.y);
      if (range > 0 && d > range) {
        state.message = `${kind === 'guns' ? 'Gun' : kind === 'torps' ? 'Torpedo' : 'Bomber'} target is out of range (${fmt(d)} > ${fmt(range)}).`;
        refreshPanels();
        return true;
      }
      if (!selectedShip.plan.weaponTargets) selectedShip.plan.weaponTargets = { guns: null, torps: null, bombers: null };
      selectedShip.plan.weaponTargets[kind] = { x: clamp(world.x, 0, MAP_W), y: clamp(world.y, 0, MAP_H), mode: kind === 'bombers' ? selectedShip.plan.bomberMode : undefined };
      clearPendingAction();
      state.message = successText;
      refreshPanels();
      return true;
    };

    if (state.pendingAction === 'guns') return void tryTargetedAction('guns', 'Gun target set.');
    if (state.pendingAction === 'torps') return void tryTargetedAction('torps', 'Torpedo target set.');
    if (state.pendingAction === 'bombers') return void setBomberTarget(selectedShip, { x: world.x, y: world.y });

    if (tappedShip && tappedShip.team !== 0 && canPlayerSee(tappedShip)) {
      state.message = `${shipDisplayName(tappedShip)} selected as a visual reference. Lead your shot if it’s moving.`;
      refreshPanels();
    }
  }

  function findShipNear(x, y, bonus = 0) {
    let best = null;
    let bestD = Infinity;
    for (const ship of state.battle.ships) {
      if (ship.destroyed) continue;
      if (ship.team !== 0 && !canPlayerSee(ship)) continue;
      const d = Math.hypot(ship.x - x, ship.y - y);
      const hit = shipRadius(ship) + bonus;
      if (d <= hit && d < bestD) { best = ship; bestD = d; }
    }
    return best;
  }

  function layoutUI() {
    const appH = Math.max(1, window.innerHeight);
    const appW = Math.max(1, window.innerWidth);
    const dockH = DOCK_HEIGHT;

    viewportEl.style.left = '0px';
    viewportEl.style.right = '0px';
    viewportEl.style.top = '0px';
    viewportEl.style.bottom = '';
    viewportEl.style.height = Math.max(160, appH - dockH) + 'px';

    bottomBar.style.left = '0px';
    bottomBar.style.right = '0px';
    bottomBar.style.top = Math.max(0, appH - dockH) + 'px';
    bottomBar.style.bottom = '';
    bottomBar.style.height = dockH + 'px';
    bottomBar.style.width = appW + 'px';
  }

  function resizeCanvas() {
    layoutUI();
    const rect = viewportEl.getBoundingClientRect();
    const w = Math.max(1, Math.floor(rect.width));
    const h = Math.max(1, Math.floor(rect.height));
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width = w;
      canvas.height = h;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      clampView();
    }
  }

  function attachInput() {
    let pinchStart = null;
    const clearPointerState = () => {
      state.pointer.down = false;
      state.pointer.dragging = false;
      state.pointer.aimWorldStart = null;
      state.pointer.aimWorldCurrent = null;
      state.pointer.aimingBomberStrike = false;
    };

    canvas.addEventListener('pointerdown', e => {
      if (overlay.classList.contains('show')) return;
      state.pointer.down = true;
      state.pointer.dragging = false;
      state.pointer.startX = state.pointer.lastX = e.clientX;
      state.pointer.startY = state.pointer.lastY = e.clientY;
      const selectedShip = getSelectedShip();
      if (state.mode === 'battle' && state.battle?.turnPhase === 'planning' && state.pendingAction === 'bombers' && selectedShip?.plan?.bomberMode === 'strike') {
        state.pointer.aimingBomberStrike = true;
        state.pointer.aimWorldStart = screenToWorld(e.clientX, e.clientY);
        state.pointer.aimWorldCurrent = state.pointer.aimWorldStart;
      }
      canvas.setPointerCapture?.(e.pointerId);
    });

    canvas.addEventListener('pointermove', e => {
      if (!state.pointer.down) return;
      const dx = e.clientX - state.pointer.lastX;
      const dy = e.clientY - state.pointer.lastY;
      const total = Math.hypot(e.clientX - state.pointer.startX, e.clientY - state.pointer.startY);
      state.pointer.lastX = e.clientX;
      state.pointer.lastY = e.clientY;
      if (total > 6) state.pointer.dragging = true;
      if (state.pointer.aimingBomberStrike) {
        state.pointer.aimWorldCurrent = screenToWorld(e.clientX, e.clientY);
        return;
      }
      if (state.pointer.dragging) {
        state.view.x -= dx / state.view.zoom;
        state.view.y -= dy / state.view.zoom;
        clampView();
      }
    });

    canvas.addEventListener('pointerup', e => {
      if (!state.pointer.down) return;
      const wasDragging = state.pointer.dragging;
      const aimingBomberStrike = state.pointer.aimingBomberStrike;
      const aimStart = state.pointer.aimWorldStart;
      const aimEnd = state.pointer.aimWorldCurrent || screenToWorld(e.clientX, e.clientY);
      state.pointer.down = false;
      state.pointer.dragging = false;
      state.pointer.aimingBomberStrike = false;
      state.pointer.aimWorldStart = null;
      state.pointer.aimWorldCurrent = null;
      if (aimingBomberStrike) {
        const selectedShip = getSelectedShip();
        if (selectedShip) setBomberTarget(selectedShip, aimStart || aimEnd, aimEnd);
      } else if (!wasDragging) {
        handleMapTap(screenToWorld(e.clientX, e.clientY));
      }
    });

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const factor = e.deltaY < 0 ? 1.12 : 0.89;
      zoomAt(e.clientX, e.clientY, factor);
    }, { passive: false });

    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        pinchStart = pinchDistance(e.touches[0], e.touches[1]);
        clearPointerState();
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      if (e.touches.length === 2 && pinchStart) {
        const newDist = pinchDistance(e.touches[0], e.touches[1]);
        const factor = newDist / pinchStart;
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        zoomAt(midX, midY, factor);
        pinchStart = newDist;
        e.preventDefault();
      }
    }, { passive: false });

    canvas.addEventListener('touchend', e => { if (e.touches.length < 2) pinchStart = null; });
    canvas.addEventListener('touchcancel', () => { pinchStart = null; clearPointerState(); });
    canvas.addEventListener('pointercancel', () => { clearPointerState(); });

    zoomInBtn.addEventListener('click', () => zoomAt(canvas.width / 2, canvas.height / 2, 1.18));
    zoomOutBtn.addEventListener('click', () => zoomAt(canvas.width / 2, canvas.height / 2, 0.85));
    centerViewBtn.addEventListener('click', () => {
      const ship = getSelectedShip();
      if (ship) { state.view.x = ship.x; state.view.y = ship.y; }
      else centerOnPlayerFleet();
      clampView();
    });
  }

  function pinchDistance(a, b) {
    return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
  }

  function zoomAt(screenX, screenY, factor) {
    const before = screenToWorld(screenX, screenY);
    state.view.zoom = clamp(state.view.zoom * factor, 0.16, 2.0);
    const after = screenToWorld(screenX, screenY);
    state.view.x += before.x - after.x;
    state.view.y += before.y - after.y;
    clampView();
  }

  function clampView() {
    const halfW = canvas.width / 2 / state.view.zoom;
    const halfH = canvas.height / 2 / state.view.zoom;
    const extra = 320;
    state.view.x = clamp(state.view.x, ARENA_CX - ARENA_R - extra + halfW, ARENA_CX + ARENA_R + extra - halfW);
    state.view.y = clamp(state.view.y, ARENA_CY - ARENA_R - extra + halfH, ARENA_CY + ARENA_R + extra - halfH);
  }

  function gameLoop() {
    if (state.mode === 'battle' && state.battle && state.battle.turnPhase === 'planning' && commandPanel.textContent.indexOf('Start a battle to issue orders.') !== -1) {
      renderCommandPanel();
    }
    if (state.mode === 'battle' && state.battle && state.battle.turnPhase === 'resolving' && !state.battle.winner) {
      resolveTurnStep(1 / 60 * RESOLVE_TIME_SCALE);
    }
    const now = performance.now();
    if (now - lastAutoSaveAt > 500) {
      saveGameState();
      lastAutoSaveAt = now;
    }
    render();
    requestAnimationFrame(gameLoop);
  }

  function init() {
    attachInput();
    const restored = loadGameState();
    if (!restored || state.mode !== 'battle' || !state.battle) {
      showSetup();
    } else {
      overlay.classList.remove('show');
    }
    refreshPanels();
    window.addEventListener('beforeunload', saveGameState);
    document.addEventListener('visibilitychange', () => { if (document.hidden) saveGameState(); });
    requestAnimationFrame(gameLoop);
  }

  init();
})();
</script>
</body>
</html>
